name: CI

# Eight-job pipeline, matching the sibling orecchiette-* crates.
#
# Job overview:
#   test           — cargo test on Linux/macOS/Windows × stable
#   clippy_fmt     — clippy -D warnings + fmt --check on Linux stable
#   miri           — cargo miri test, whole crate (no FFI, no real I/O)
#   deny           — cargo-deny advisories check (RUSTSEC vulnerabilities)
#   hack           — cargo-hack feature permutations
#   machete        — cargo-machete unused dependencies
#   semver_checks  — cargo-semver-checks (advisory)
#   coverage       — cargo llvm-cov, uploaded to Codecov (Linux stable)
#
# `workflow_dispatch` is enabled so the user can manually rebuild any
# job without pushing.

# Least-privilege token: no job in this workflow writes to the
# repository (flagged by CodeQL actions/missing-workflow-permissions).
permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all-features

  clippy_fmt:
    name: Clippy + Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: miri

      - uses: Swatinem/rust-cache@v2

      - name: cargo miri test
        run: cargo miri test

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Runs all cargo-deny checks (advisories, licenses, bans, sources)
      # based on deny.toml configuration.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  hack:
    name: cargo-hack (feature permutations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      - name: cargo hack
        run: cargo hack check --each-feature --no-dev-deps

  machete:
    name: cargo-machete (unused dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-machete
        uses: taiki-e/install-action@cargo-machete

      - name: cargo machete
        run: cargo machete

  semver_checks:
    name: cargo-semver-checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      - name: cargo semver-checks
        run: cargo semver-checks check-release

  coverage:
    name: Coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: cargo llvm-cov
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false  # coverage drop != broken build
